<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <style>
        /* Exact physical dimensions for thermal printing */
        @page { size: 30mm 50mm; margin: 0; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 0; 
            background: #f0f0f0;
            display: flex; justify-content: center;
        }

        .label {
            width: 30mm; height: 50mm;
            background: white;
            position: relative; /* Absolute base */
            overflow: hidden;
        }

        /* SKU: Fixed at the top */
        .sku {
            position: absolute;
            top: 2mm; width: 100%;
            text-align: center;
            font-size: 24pt; font-weight: 800;
            line-height: 1;
        }

        /* Product Name: Centered below SKU */
        .name {
            position: absolute;
            top: 13mm; width: 100%;
            padding: 0 2mm; box-sizing: border-box;
            text-align: center;
            font-size: 7.2pt; line-height: 1.2;
        }

        /* Divider: Fixed position */
        .line {
            position: absolute;
            top: 22mm; left: 10%; width: 80%;
            border-top: 1px dashed black;
        }

        /* Instructions: Middle block */
        .instr {
            position: absolute;
            top: 24mm; left: 2.5mm; width: 25mm;
            font-size: 6.8pt; line-height: 1.4;
        }

        /* Bottom Section: Grouped for stability */
        .bottom-area {
            position: absolute;
            bottom: 2mm; left: 2mm; right: 2mm;
            height: 12mm;
            display: flex; justify-content: space-between; align-items: flex-end;
        }

        .price-box { text-align: left; }
        .price { font-size: 15pt; font-weight: 700; line-height: 1; }
        .vnd { font-size: 6pt; margin-left: 0.5mm; }
        .variant { font-size: 7.5pt; margin: 1mm 0; white-space: nowrap; }
        .meta { font-size: 5.5pt; font-style: italic; color: #333; }

        /* Black Size Box: Fixed 10mm square */
        .size-box {
            background: black; color: white;
            width: 10mm; height: 10mm;
            display: flex; justify-content: center; align-items: center;
            font-size: 20pt; font-weight: 900;
        }

        @media print { body { background: none; } }
    </style>
</head>
<body>

<div class="label">
    <div class="sku" id="sku">WT0209</div>
    <div class="name" id="name">Set áo tay dài cài nút mỏng cùng áo quây thắt nơ</div>
    <div class="line"></div>
    <div class="instr" id="instr">
        - Không giặt chung 2 áo (áo xám).<br>
        - Sử dụng túi giặt khi giặt máy.<br>
        - Giặt nước lạnh dưới 30°C.
    </div>
    <div class="bottom-area">
        <div class="price-box">
            <div class="price"><span id="price">350.000</span><span class="vnd">VND</span></div>
            <div class="variant" id="variant">K104 - Xám đậm</div>
            <div class="meta" id="meta">2026-04-14 | <b>XKQ12</b></div>
        </div>
        <div class="size-box" id="size">M</div>
    </div>
</div>

<script>
    const p = new URLSearchParams(window.location.search);
    
    // Fill data from URL or use reference defaults
    if(p.has('sku')) document.getElementById('sku').innerText = p.get('sku');
    if(p.has('name')) document.getElementById('name').innerText = p.get('name');
    if(p.has('size')) document.getElementById('size').innerText = p.get('size');
    if(p.has('variant')) document.getElementById('variant').innerText = p.get('variant');
    
    const rawPrice = p.get('price') || "350000";
    document.getElementById('price').innerText = Number(rawPrice).toLocaleString('de-DE');

    // Auto-shrink SKU if it exceeds standard length to avoid clipping
    const sku = document.getElementById('sku');
    if (sku.innerText.length > 7) sku.style.fontSize = "16pt";
</script>

</body>
</html>
