<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <style>
        @page { size: 30mm 50mm; margin: 0; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 0; 
            display: flex; justify-content: center;
            background: #f4f4f4;
        }

        .label {
            width: 30mm; height: 50mm;
            background: white;
            position: relative;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* Đổi tên class .sku -> .model-sku */
        .model-sku {
            position: absolute;
            top: 0.5mm; width: 100%; left: 0;
            text-align: center;
            font-size: 17pt; font-weight: 800;
            line-height: 1;
        }

        .content-area {
            position: absolute;
            top: 7mm; left: 0; width: 100%;
            max-height: 32mm; 
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden;
        }

        /* Đổi tên class .name -> .product-name */
        .product-name { width: 100%; text-align: center; font-size: 5pt; font-weight: 400; line-height: 1.2; margin-bottom: 1.5mm; }
        .divider { width: 80%; border-top: 0.5pt dashed black; margin-bottom: 1.5mm; }
        /* Đổi tên class .instr -> .instruction */
        .instruction { width: 100%; font-size: 5.5pt; line-height: 1.4; text-align: left; padding: 0 0.5mm; box-sizing: border-box; }

        /* Đổi tên class .price-row -> .price */
        .price { 
            position: absolute;
            bottom: 6mm; 
            left: 1mm;
            font-size: 10pt; font-weight: 700; 
            display: flex; align-items: baseline;
            background: white;
            z-index: 10;
        }

        .vnd { font-size: 4pt; font-weight: 400; margin-left: 1px; }

        /* Đổi tên class .variant -> .variant-info */
        .variant-info { 
            position: absolute;
            bottom: 3.8mm; 
            left: 1mm;
            font-size: 5pt; font-weight: 400; 
            z-index: 10;
        }

        /* Đổi tên class .batch-container -> .batch-info */
        .batch-info { 
            position: absolute;
            bottom: 1.3mm; 
            left: 1mm;
            font-size: 4pt;
            display: flex;
            gap: 2px;
            z-index: 10;
        }

        .time-part { font-style: italic; font-weight: 400; }
        /* Đổi tên class .batch-part -> .batch */
        .batch { font-style: italic; font-weight: 700; }

        /* Đổi tên class .size-box -> .size */
        .size {
            position: absolute;
            bottom: 3mm; 
            right: 1mm; 
            background: black !important;
            color: white !important;
            width: 10mm; height: 7.5mm;
            display: flex; justify-content: center; align-items: center;
            font-size: 18pt; font-weight: 900;
            z-index: 10;
            -webkit-print-color-adjust: exact; 
            print-color-adjust: exact;
        }

        @media print { 
            body { background: none; }
            .size {
                background: black !important;
                color: white !important;
                -webkit-print-color-adjust: exact;
            }
        }
    </style>
</head>
<body>

<div class="label">
    <div class="model-sku" id="model-sku">WD0205</div>

    <div class="content-area">
        <div class="product-name" id="product-name">Áo dài Trà Nguyệt - Áo dài dáng yếm cổ chi tiết dây cột nơ phom suông</div>
        <div class="divider"></div>
        <div class="instruction" id="instruction">
            - Vui lòng phơi sản phẩm dưới bóng mát.<br>
            - Tránh tiếp xúc với ánh nắng trực tiếp.<br>
            - Bảo quản sản phẩm ở nơi khô ráo và thoáng mát
        </div>
    </div>

    <div class="price">
        <span id="price-value">540.000</span>
        <span class="vnd">VND</span>
    </div>

    <div class="variant-info" id="variant">S241 - Kem</div>

    <div class="batch-info">
        <span class="time-part" id="current-time"></span>
        <span class="batch" id="batch"></span>
    </div>

    <div class="size" id="size">XL</div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    
    // Đồng bộ hoàn toàn tham số URL và ID phần tử
    if(params.has('model-sku')) document.getElementById('model-sku').innerText = params.get('model-sku');
    if(params.has('product-name')) document.getElementById('product-name').innerText = params.get('product-name');
    if(params.has('size')) document.getElementById('size').innerText = params.get('size');
    if(params.has('variant')) document.getElementById('variant').innerText = params.get('variant');
    
    if(params.has('instruction')) {
        document.getElementById('instruction').innerHTML = params.get('instruction').replace(/\n/g, '<br>');
    }
    
    const rawPrice = params.get('price') || "540000";
    document.getElementById('price-value').innerText = Number(rawPrice).toLocaleString('de-DE');

    const now = new Date();
    const datePart = now.toISOString().split('T')[0];
    const timePart = now.toTimeString().split(' ')[0];
    document.getElementById('current-time').innerText = `${datePart} ${timePart}`;

    const batchCode = params.get('batch') || "XKQ12";
    document.getElementById('batch').innerText = `| ${batchCode}`;
</script>

</body>
</html>
