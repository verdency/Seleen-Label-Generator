<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @page { size: 30mm 50mm; margin: 0; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0; 
            display: flex; justify-content: center;
            background: #f4f4f4;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        .label {
            width: 30mm; height: 50mm;
            background: white;
            position: relative;
            overflow: hidden;
            box-sizing: border-box;
        }

        .model-sku {
            position: absolute;
            top: 0.5mm; width: 100%; left: 0;
            text-align: center;
            font-size: 17pt; font-weight: 800;
            line-height: 1;
            letter-spacing: -0.2mm;
        }

        .content-area {
            position: absolute;
            top: 7mm; left: 0; width: 100%;
            max-height: 32mm; 
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden;
        }

        .product-name { 
            width: 100%; text-align: center; font-size: 5pt; 
            font-weight: 400; line-height: 1.1; margin-bottom: 1mm; 
        }
        
        .divider { 
            width: 80%; 
            border-top: 0.6pt dashed black; 
            margin-bottom: 1.5mm; 
        }

        .instruction { 
            width: 100%; font-size: 6pt; line-height: 1.3; 
            text-align: left; padding: 0 0.5mm; box-sizing: border-box; 
        }

        .price { 
            position: absolute;
            bottom: 6mm; 
            left: 1mm;
            font-size: 9.7pt; font-weight: 700; 
            display: flex; align-items: baseline;
            background: white;
            z-index: 10;
        }

        .vnd { font-size: 4pt; font-weight: 400; margin-left: 0.5px; }

        .batch { 
            position: absolute;
            bottom: 3.8mm; 
            left: 1mm;
            font-size: 4.6pt; font-weight: 400; 
            z-index: 10;
        }

        /* Phần chứa QR Code bên phải lề dưới */
        #qrcode {
            position: absolute;
            bottom: 11mm; 
            right: 1mm;
            z-index: 20;
        }

        .variant-info { 
            position: absolute;
            bottom: 1.3mm; 
            left: 1mm;
            width: calc(100% - 2mm); /* Kéo dãn chiều ngang ra sát mép label (30mm) */
            font-size: 5pt;
            display: flex;
            gap: 2px;
            z-index: 10;
            white-space: nowrap; /* Giữ văn bản trên một dòng */
            overflow: hidden; /* Tránh tràn nếu text quá cực đoan */
        }

        .variant { font-style: italic; font-weight: 600; }
        .time-part { font-style: italic; font-weight: 400; }

        .size {
            position: absolute;
            bottom: 4mm; 
            right: .5mm; 
            background: black !important;
            color: white !important;
            width: 9.5mm; height: 7.5mm;
            display: flex; justify-content: center; align-items: center;
            font-size: 18pt; font-weight: 900;
            z-index: 10;
            -webkit-print-color-adjust: exact; 
            print-color-adjust: exact;
            shape-rendering: crispEdges;
        }

        @media print { 
            body { background: none; width: 30mm; height: 50mm; }
            .size { background: black !important; -webkit-print-color-adjust: exact; }
            /* Giữ nguyên QR Code khi in */
            #qrcode img { display: block; }
        }
    </style>
</head>
<body>

<div class="label">
    <div class="model-sku" id="model-sku">WD0205</div>

    <div class="content-area">
        <div class="product-name" id="product-name">Áo dài Trà Nguyệt - Áo dài dáng yếm cổ chi tiết dây cột nơ phom suông</div>
        <div class="divider"></div>
        <div class="instruction" id="instruction">
            - Vui lòng phơi sản phẩm dưới bóng mát.<br>
            - Tránh tiếp xúc với ánh nắng trực tiếp.<br>
            - Bảo quản sản phẩm ở nơi khô ráo và thoáng mát
        </div>
    </div>

    <div id="qrcode"></div>

    <div class="price">
        <span id="price-value">540.000</span>
        <span class="vnd">VND</span>
    </div>

    <div class="batch" id="batch">SE-260330-0202-L122-FL3</div>

    <div class="variant-info">
        <span class="variant" id="variant"></span>
        <span class="time-part" id="current-time"></span>
    </div>

    <div class="size" id="size">XL</div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    
    if(params.has('model-sku')) document.getElementById('model-sku').innerText = params.get('model-sku');
    if(params.has('product-name')) document.getElementById('product-name').innerText = params.get('product-name');
    if(params.has('size')) document.getElementById('size').innerText = params.get('size');
    if(params.has('batch')) document.getElementById('batch').innerText = params.get('batch');
    
    if(params.has('instruction')) {
        document.getElementById('instruction').innerHTML = params.get('instruction').replace(/\n/g, '<br>');
    }
    
    const rawPrice = params.get('price') || "1000300";
    document.getElementById('price-value').innerText = Number(rawPrice).toLocaleString('en-US');

    const now = new Date();
    const datePart = now.toISOString().split('T')[0];
    const timePart = now.toTimeString().split(' ')[0];
    document.getElementById('current-time').innerText = `${datePart} ${timePart}`;

    const variantCode = params.get('variant') || "K124 - Đen";
    document.getElementById('variant').innerText = ` ${variantCode} |`;

    // XỬ LÝ QR CODE ĐỘNG
    const qrValue = params.get('qr-code') || "";
    new QRCode(document.getElementById("qrcode"), {
        text: qrValue,
        width: 34, // Khoảng 9mm
        height: 34,
        colorDark : "#000000",
        colorLight : "#ffffff",
        correctLevel : QRCode.CorrectLevel.L // Mức độ sửa lỗi thấp nhất để hình QR đơn giản, sắc nét khi in nhỏ
    });
</script>

</body>
</html>
