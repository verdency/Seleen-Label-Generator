<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <style>
        @page { size: 30mm 50mm; margin: 0; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 0; 
            display: flex; justify-content: center;
            background: #f4f4f4;
        }

        .label {
            width: 30mm; height: 50mm;
            background: white;
            position: relative;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* SKU và Content Area giữ nguyên */
        .sku {
            position: absolute;
            top: 0.5mm; width: 100%; left: 0;
            text-align: center;
            font-size: 17pt; font-weight: 800;
            line-height: 1;
        }

        .content-area {
            position: absolute;
            top: 7mm; left: 0; width: 100%;
            display: flex; flex-direction: column; align-items: center;
        }

        .name { width: 100%; text-align: center; font-size: 5pt; font-weight: 400; line-height: 1.2; margin-bottom: 1mm; }
        .divider { width: 80%; border-top: 0.5pt dashed black; margin-bottom: 1mm; }
        .instr { width: 100%; font-size: 5.5pt; line-height: 1.4; text-align: left; padding: 0 0.5mm; box-sizing: border-box; }

        /* TÁCH ĐỘC LẬP CÁC THÀNH PHẦN FOOTER */

        .price-row { 
            position: absolute;
            bottom: 8.5mm; /* Cách đáy 8.5mm */
            left: 2mm;
            font-size: 10pt; font-weight: 700; 
            display: flex; align-items: baseline;
        }

        .vnd { 
            font-size: 5pt; font-weight: 400; 
            margin-left: 2px;
        }

        .variant { 
            position: absolute;
            bottom: 5.5mm; /* Cách đáy 5.5mm */
            left: 2mm;
            font-size: 5pt; font-weight: 400; 
        }

        .batch { 
            position: absolute;
            bottom: 2mm; /* Cách đáy 2mm */
            left: 2mm;
            font-size: 4pt; font-weight: 700; font-style: italic; 
        }

        .size-box {
            position: absolute;
            bottom: 2mm; /* Cách đáy 2mm */
            right: 2mm;  /* Sát mép phải */
            background: black; color: white;
            width: 9mm; height: 9mm;
            display: flex; justify-content: center; align-items: center;
            font-size: 14pt; font-weight: 700;
        }

        @media print { body { background: none; } }
    </style>
</head>
<body>

<div class="label">
    <div class="sku" id="sku">WD0205</div>

    <div class="content-area">
        <div class="name" id="name">Áo dài Trà Nguyệt - Áo dài dáng yếm cổ chi tiết dây cột nơ phom suông</div>
        <div class="divider"></div>
        <div class="instr" id="instr">
            - Vui lòng phơi sản phẩm dưới bóng mát.<br>
            - Tránh tiếp xúc với ánh nắng trực tiếp<br>
            - Bảo quản sản phẩm ở nơi khô ráo và thoáng mát
        </div>
    </div>

    <div class="price-row">
        <span id="price">540.000</span>
        <span class="vnd">VND</span>
    </div>

    <div class="variant" id="variant">S241 - Kem</div>

    <div class="batch" id="batch">2026-04-21 | XKQ12</div>

    <div class="size-box" id="size">S</div>
</div>

<script>
    const p = new URLSearchParams(window.location.search);
    if(p.has('sku')) document.getElementById('sku').innerText = p.get('sku');
    if(p.has('name')) document.getElementById('name').innerText = p.get('name');
    if(p.has('size')) document.getElementById('size').innerText = p.get('size');
    if(p.has('variant')) document.getElementById('variant').innerText = p.get('variant');
    
    const rawPrice = p.get('price') || "540000";
    document.getElementById('price').innerText = Number(rawPrice).toLocaleString('de-DE');

    const batchCode = p.get('batch') || "XKQ12";
    const date = new Date().toISOString().split('T')[0];
    document.getElementById('batch').innerText = `${date} | ${batchCode}`;
</script>

</body>
</html>
