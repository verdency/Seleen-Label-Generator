<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Label 30x50mm Generator</title>
    <style>
        /* Print settings for 30x50mm */
        @page { size: 30mm 50mm; margin: 0; }
        
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
            background: #f0f0f0; 
            display: flex; 
            justify-content: center;
        }

        .label-container {
            width: 30mm;
            height: 50mm;
            background: white;
            padding: 1.5mm 2mm;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* SKU - Large and Center */
        .sku-header { 
            font-size: 26pt; 
            font-weight: 800; 
            margin: 0; 
            line-height: 1;
            color: black;
            text-align: center;
        }

        .product-name { 
            font-size: 8pt; 
            text-align: center; 
            margin: 1.5mm 0; 
            font-weight: 400;
            line-height: 1.2;
            width: 100%;
        }

        .divider { 
            width: 85%; 
            border-top: 1px dashed #000; 
            margin: 1mm 0 2mm 0; 
        }

        /* Middle Section: Instructions */
        .instructions { 
            font-size: 7.2pt; 
            align-self: flex-start; 
            line-height: 1.4; 
            flex-grow: 1; /* Pushes price/size to bottom */
            padding-left: 1mm;
        }

        /* Bottom Section Wrapper */
        .bottom-row {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-top: 2mm;
        }

        .price-info { text-align: left; flex: 1; }

        .price-row { display: flex; align-items: baseline; }
        .price { font-size: 16pt; font-weight: 700; margin-right: 1mm; }
        .currency { font-size: 6.5pt; font-weight: 600; }

        .variant-text { font-size: 7.5pt; margin-top: 0.5mm; font-weight: 400; }
        
        .meta-data { 
            font-size: 6pt; 
            font-style: italic; 
            margin-top: 0.8mm; 
            color: #333; 
        }

        /* Black Size Box */
        .size-box {
            background: black;
            color: white;
            min-width: 9.5mm;
            height: 9.5mm;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 19pt;
            font-weight: 900;
            margin-left: 1mm;
        }

        /* Visual separation for non-print view */
        @media screen {
            body { padding: 20px; }
            .label-container { border: 1px solid #ccc; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        }

        /* Print formatting */
        @media print {
            body { background: none; }
            .label-container { border: none; }
        }
    </style>
</head>
<body>

<div class="label-container">
    <div class="sku-header" id="disp-sku">SKU</div>
    <div class="product-name" id="disp-name">Loading...</div>
    
    <div class="divider"></div>

    <div class="instructions" id="disp-instr">
        - Loading instructions...
    </div>

    <div class="bottom-row">
        <div class="price-info">
            <div class="price-row">
                <span class="price" id="disp-price">0</span>
                <span class="currency">VND</span>
            </div>
            <div class="variant-text" id="disp-variant">-</div>
            <div class="meta-data" id="disp-meta">2026-04-14 | <b>XK012</b></div>
        </div>
        <div class="size-box" id="disp-size">S</div>
    </div>
</div>

<script>
    // URL Parameter Logic
    const params = new URLSearchParams(window.location.search);

    // Dynamic field injection
    document.getElementById('disp-sku').innerText = params.get('sku') || 'WB0206';
    document.getElementById('disp-name').innerText = params.get('name') || 'Product Name Placeholder';
    
    // Formatting Price with dots (e.g., 350.000)
    const rawPrice = params.get('price') || '0';
    document.getElementById('disp-price').innerText = Number(rawPrice).toLocaleString('de-DE');

    document.getElementById('disp-size').innerText = params.get('size') || 'S';
    document.getElementById('disp-variant').innerText = (params.get('variant') || '-');
    
    // Instructions support newlines via %0A in URL
    const instr = params.get('instr');
    if (instr) {
        document.getElementById('disp-instr').innerHTML = instr.split('\n').map(line => `${line.trim()}<br>`).join('');
    } else {
        document.getElementById('disp-instr').innerHTML = "- Không giặt chung với đồ trắng<br>- Giặt với nước lạnh dưới 30°C";
    }

    // Dynamic Timestamp + Batch
    const batch = params.get('batch') || 'XK012';
    const now = new Date();
    const dateStr = now.toISOString().split('T')[0] + ' ' + now.toTimeString().split(' ')[0].substring(0,5);
    document.getElementById('disp-meta').innerHTML = `${dateStr} | <b>${batch}</b>`;

    // Optional: Auto-trigger print
    // window.print();
</script>

</body>
</html>
