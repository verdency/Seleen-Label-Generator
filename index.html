<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <style>
        /* Strict sizing for 30x50mm Thermal Labels */
        @page { size: 30mm 50mm; margin: 0; }
        
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; padding: 0; 
            display: flex; justify-content: center;
            background: #e0e0e0;
        }

        .label-container {
            width: 30mm;
            height: 50mm;
            background: white;
            padding: 1.5mm 1.8mm;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top SKU Section - Fixed Height */
        .sku-section {
            height: 10mm;
            display: flex; align-items: center; justify-content: center;
        }
        .sku-header { 
            font-size: 22pt; font-weight: 800; line-height: 1; margin: 0;
            white-space: nowrap;
        }

        /* Name Section - Responsive Height */
        .name-section {
            height: 7mm;
            display: flex; align-items: center; justify-content: center;
            text-align: center; margin: 1mm 0;
        }
        .product-name { 
            font-size: 6.8pt; line-height: 1.1; font-weight: 400;
            overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
        }

        .divider { border-top: 0.8pt dashed #000; width: 90%; margin: 0 auto; }

        /* Instructions Section - Dynamic space */
        .instr-section {
            font-size: 6.5pt; line-height: 1.3;
            flex-grow: 1; padding: 1mm 0.5mm;
            overflow: hidden;
        }

        /* Bottom Row - Fixed to Footer */
        .bottom-row {
            height: 11mm;
            display: flex; justify-content: space-between; align-items: flex-end;
            border-top: 0.5pt solid #eee; padding-top: 1mm;
        }

        .price-group { text-align: left; }
        .price-text { font-size: 13pt; font-weight: 700; line-height: 1; }
        .currency { font-size: 6pt; }
        .variant-info { font-size: 6.8pt; margin: 0.5mm 0; white-space: nowrap; }
        .meta-text { font-size: 5.5pt; color: #444; font-style: italic; }

        /* Size Box - Fixed Square */
        .size-box {
            background: black; color: white;
            width: 9mm; height: 9mm;
            display: flex; justify-content: center; align-items: center;
            font-size: 18pt; font-weight: 900;
        }

        @media print { body { background: none; } .label-container { border: none; } }
    </style>
</head>
<body>

<div class="label-container">
    <div class="sku-section">
        <div class="sku-header" id="sku">WT0209</div>
    </div>
    
    <div class="name-section">
        <div class="product-name" id="name">Set áo tay dài cài nút mỏng cùng áo quây thắt nơ</div>
    </div>
    
    <div class="divider"></div>

    <div class="instr-section" id="instr">
        - Không giặt chung 2 áo (áo xám).<br>
        - Sử dụng túi giặt khi giặt máy.<br>
        - Giặt nước lạnh dưới 30°C.
    </div>

    <div class="bottom-row">
        <div class="price-group">
            <div class="price-text"><span id="price">350.000</span> <span class="currency">VND</span></div>
            <div class="variant-info" id="variant">K104 - Xám đậm</div>
            <div class="meta-text" id="meta">2026-04-14 | <b>XKQ12</b></div>
        </div>
        <div class="size-box" id="size">M</div>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);

    // Update fields or use document defaults 
    if(params.has('sku')) document.getElementById('sku').innerText = params.get('sku');
    if(params.has('name')) document.getElementById('name').innerText = params.get('name');
    if(params.has('size')) document.getElementById('size').innerText = params.get('size');
    if(params.has('variant')) document.getElementById('variant').innerText = params.get('variant');
    
    // Formatting Price for Seleen standards 
    const rawPrice = params.get('price') || "350000";
    document.getElementById('price').innerText = Number(rawPrice).toLocaleString('de-DE');

    // Dynamic Metadata 
    const batch = params.get('batch') || "XKQ12";
    const date = new Date().toISOString().split('T')[0];
    document.getElementById('meta').innerHTML = `${date} | <b>${batch}</b>`;

    // Shrink SKU if it's too long
    const skuEl = document.getElementById('sku');
    if (skuEl.innerText.length > 7) skuEl.style.fontSize = "16pt";
</script>

</body>
</html>
