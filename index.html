<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <style>
        @page { size: 30mm 50mm; margin: 0; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 0; 
            background: #f0f0f0;
            display: flex; justify-content: center;
        }

        .label-grid {
            width: 30mm;
            height: 50mm;
            background: white;
            padding: 1.5mm 2mm;
            box-sizing: border-box;
            display: grid;
            /* Defining rows: SKU, Name, Divider, Instructions, Bottom Info */
            grid-template-rows: 10mm 9mm 2mm 15mm 1fr;
            grid-template-columns: 1fr;
            align-items: center;
            overflow: hidden;
        }

        /* 1. SKU Row */
        .sku { 
            font-size: 24pt; font-weight: 800; 
            text-align: center; line-height: 1;
            white-space: nowrap;
        }

        /* 2. Name Row */
        .name { 
            font-size: 7.2pt; text-align: center; 
            line-height: 1.1; overflow: hidden;
            display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
        }

        /* 3. Divider */
        .divider { border-top: 1px dashed #000; width: 90%; justify-self: center; }

        /* 4. Instructions Row */
        .instr { 
            font-size: 6.8pt; line-height: 1.3; 
            align-self: start; padding-top: 1mm;
        }

        /* 5. Bottom Row (Price & Size) */
        .bottom-section {
            display: grid;
            grid-template-columns: 1fr 9.5mm;
            grid-template-rows: 1fr;
            align-items: end;
            width: 100%;
        }

        .price-data { text-align: left; }
        .price-row { font-size: 14pt; font-weight: 700; display: flex; align-items: baseline; }
        .currency { font-size: 6pt; margin-left: 0.5mm; }
        
        .variant { font-size: 7.2pt; margin: 0.5mm 0; white-space: nowrap; }
        .footer { font-size: 5.8pt; font-style: italic; color: #333; }

        .size-box {
            background: black; color: white;
            width: 9.5mm; height: 9.5mm;
            display: flex; justify-content: center; align-items: center;
            font-size: 19pt; font-weight: 900;
        }

        @media print { body { background: none; } }
    </style>
</head>
<body>

<div class="label-grid">
    <div class="sku" id="sku">WT0209</div>
    <div class="name" id="name">Set áo tay dài cài nút mỏng cùng áo quây thắt nơ</div>
    <div class="divider"></div>
    <div class="instr" id="instr">
        - Không giặt chung 2 áo (áo xám).<br>
        - Sử dụng túi giặt khi giặt máy.<br>
        - Giặt nước lạnh dưới 30°C.
    </div>
    <div class="bottom-section">
        <div class="price-data">
            <div class="price-row"><span id="price">350.000</span><span class="currency">VND</span></div>
            <div class="variant" id="variant">K104 - Xám đậm</div>
            <div class="footer" id="footer">2026-04-14 | <b>XKQ12</b></div>
        </div>
        <div class="size-box" id="size">M</div>
    </div>
</div>

<script>
    const p = new URLSearchParams(window.location.search);
    
    // Updates
    if(p.has('sku')) document.getElementById('sku').innerText = p.get('sku');
    if(p.has('name')) document.getElementById('name').innerText = p.get('name');
    if(p.has('size')) document.getElementById('size').innerText = p.get('size');
    if(p.has('variant')) document.getElementById('variant').innerText = p.get('variant');
    if(p.has('batch')) document.getElementById('footer').innerHTML = `2026-04-14 | <b>${p.get('batch')}</b>`;
    
    const priceRaw = p.get('price') || "350000";
    document.getElementById('price').innerText = Number(priceRaw).toLocaleString('de-DE');

    // Auto-shrink SKU if it exceeds 6 characters
    if (document.getElementById('sku').innerText.length > 6) {
        document.getElementById('sku').style.fontSize = "18pt";
    }
</script>

</body>
</html>
