<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Seleen Label 30x50mm</title>
    <style>
        /* Print settings for 30x50mm Portrait */
        @page { size: 30mm 50mm; margin: 0; }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 0; 
            background: #f4f4f4; 
            display: flex; 
            justify-content: center;
        }

        .label-container {
            width: 30mm;
            height: 50mm;
            background: white;
            padding: 1.5mm 2.5mm;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* SKU Header */
        .sku-header { 
            font-size: 26pt; 
            font-weight: 800; 
            margin: 0; 
            line-height: 1.1;
            text-align: center;
        }

        /* Product Name from Reference File */
        .product-name { 
            font-size: 7.5pt; 
            text-align: center; 
            margin: 1mm 0; 
            font-weight: 400;
            line-height: 1.2;
            width: 100%;
        }

        .divider { 
            width: 90%; 
            border-top: 1px dashed #000; 
            margin: 1.5mm 0; 
        }

        /* Instructions Section */
        .instructions { 
            font-size: 7.2pt; 
            align-self: flex-start; 
            line-height: 1.5; 
            flex-grow: 1;
            padding-left: 0.5mm;
            font-weight: 400;
        }

        /* Bottom Row with Price and Size */
        .bottom-row {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-top: 1mm;
        }

        .price-info { text-align: left; }

        .price-row { display: flex; align-items: baseline; }
        .price { font-size: 17pt; font-weight: 700; margin-right: 1mm; }
        .currency { font-size: 7pt; font-weight: 600; }

        .variant-text { font-size: 8pt; margin-top: 0.5mm; font-weight: 400; }
        
        .meta-data { 
            font-size: 6.2pt; 
            font-style: italic; 
            margin-top: 1mm; 
            color: #222; 
        }

        /* Black Size Box */
        .size-box {
            background: black;
            color: white;
            min-width: 10mm;
            height: 10mm;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20pt;
            font-weight: 900;
        }

        @media screen {
            body { padding: 20px; }
            .label-container { border: 1px solid #ccc; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        }

        @media print {
            body { background: none; }
            .label-container { border: none; }
        }
    </style>
</head>
<body>

<div class="label-container">
    <div class="sku-header" id="disp-sku">SKU</div>
    <div class="product-name" id="disp-name">Loading Name...</div>
    
    <div class="divider"></div>

    <div class="instructions" id="disp-instr">
        - Không giặt chung 2 áo vì có thể bị lem màu (áo xám).<br>
        - Nên sử dụng túi giặt khi giặt máy.<br>
        - Giặt với nước lạnh dưới 30°C.
    </div>

    <div class="bottom-row">
        <div class="price-info">
            <div class="price-row">
                <span class="price" id="disp-price">0</span>
                <span class="currency">VND</span>
            </div>
            <div class="variant-text" id="disp-variant">-</div>
            <div class="meta-data" id="disp-meta">Loading Metadata...</div>
        </div>
        <div class="size-box" id="disp-size">S</div>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);

    // Default values from '30 x 50 Nhãn Tag quần áo Seleen.docx'
    const defaultData = {
        sku: 'WT0080',
        name: 'Set áo tay dài cài nút mỏng cùng áo quây thắt nơ',
        price: '350000',
        variant: 'K104 - Xám đậm',
        size: 'S',
        batch: 'XKQ12',
        instr: '- Không giặt chung 2 áo vì có thể bị lem màu (áo xám).\n- Nên sử dụng túi giặt khi giặt máy.\n- Giặt với nước lạnh dưới 30°C.'
    };

    // Mapping URL params or falling back to doc defaults
    document.getElementById('disp-sku').innerText = params.get('sku') || defaultData.sku;
    document.getElementById('disp-name').innerText = params.get('name') || defaultData.name;
    
    // Formatting Price (e.g., 350,000)
    const priceVal = params.get('price') || defaultData.price;
    document.getElementById('disp-price').innerText = Number(priceVal).toLocaleString('en-US');

    document.getElementById('disp-size').innerText = params.get('size') || defaultData.size;
    document.getElementById('disp-variant').innerText = params.get('variant') || defaultData.variant;
    
    // Handle Instructions (supports newlines)
    const instrStr = params.get('instr') || defaultData.instr;
    document.getElementById('disp-instr').innerHTML = instrStr.replace(/\n/g, '<br>');

    // Metadata: Timestamp + Batch code from doc
    const batchCode = params.get('batch') || defaultData.batch;
    const now = new Date();
    const formattedDate = now.toISOString().split('T')[0] + ' ' + now.toTimeString().split(' ')[0];
    document.getElementById('disp-meta').innerHTML = `${formattedDate} | <b>${batchCode}</b>`;

    // Auto-trigger print if requested via URL param ?print=true
    if (params.get('print') === 'true') {
        window.print();
    }
</script>

</body>
</html>
